services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: agent_system_rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent_system_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_worker:
    build: .
    container_name: agent_system_celery
    command: celery -A src.celery.app worker --loglevel=info --concurrency=2
    environment:
      - CELERY_BROKER_URL=amqp://admin:admin@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://77.234.216.102:17640/gemma3/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-TO_FILL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped

  flower:
    build: .
    container_name: agent_system_flower
    command: celery -A src.celery.app flower --port=5555 --broker=amqp://admin:admin@rabbitmq:5672/
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://admin:admin@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped

  api:
    build: .
    container_name: agent_system_api
    command: python api.py
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=amqp://admin:admin@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://77.234.216.102:17640/gemma3/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-TO_FILL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped

  streamlit:
    build: .
    container_name: agent_system_streamlit
    command: streamlit run streamlit_app.py --server.port=8501 --server.headless=true --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://77.234.216.102:17640/gemma3/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-TO_FILL}
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
